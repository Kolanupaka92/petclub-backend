steps:
  # Build the Docker image
  # Region: us-west1 (GCP Oregon) — co-located with Supabase (AWS us-west-2 / Oregon).
  # This minimises DB round-trip latency (~5ms intra-region vs ~60ms cross-coast).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-west1-docker.pkg.dev/project-c736b433-1b47-40c0-a2c/petclub-repo/petclub-backend:$COMMIT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/project-c736b433-1b47-40c0-a2c/petclub-repo/petclub-backend:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-west1-docker.pkg.dev/project-c736b433-1b47-40c0-a2c/petclub-repo/petclub-backend'

  # Deploy to Cloud Run (us-west1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'petclub-backend'
      - '--image'
      - 'us-west1-docker.pkg.dev/project-c736b433-1b47-40c0-a2c/petclub-repo/petclub-backend:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--port=8080'
      - '--min-instances=1'       # always warm — eliminates cold starts, keeps SSE connections alive
      - '--max-instances=10'      # cap runaway scaling
      - '--memory=1Gi'            # Node.js + SSE connections need headroom
      - '--cpu=1'
      - '--concurrency=80'        # requests per instance before scale-out triggers
      - '--timeout=3600'          # 60 min — required for long-lived SSE tracking connections
      - '--update-env-vars=JWT_EXPIRES_IN=15m,REFRESH_TOKEN_TTL_DAYS=30,CRON_SECRET=2298f0a5c7bc55145d2b9e205458acb39e12fa53e1bdbc135a7c9a28d2a1f20b'
      - '--quiet'

images:
  - 'us-west1-docker.pkg.dev/project-c736b433-1b47-40c0-a2c/petclub-repo/petclub-backend'

options:
  logging: CLOUD_LOGGING_ONLY
