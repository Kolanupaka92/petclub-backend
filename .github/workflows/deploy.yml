# ══════════════════════════════════════════════════════════════════
#  PETclub Backend — GitHub Actions → Google Cloud Run
#  Triggered: every push to main
#
#  Auth: Workload Identity Federation (keyless — no JSON key needed)
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    GCP_PROJECT_ID              — project-c736b433-1b47-40c0-a2c
#    GCP_WORKLOAD_IDENTITY_PROVIDER
#      — full resource name, e.g.:
#        projects/1084002294076/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#
#  Service account used (no key required):
#    1084002294076-compute@developer.gserviceaccount.com
#
#  Required IAM roles on the service account:
#    roles/artifactregistry.writer
#    roles/run.developer
#    roles/iam.serviceAccountUser
#    roles/storage.objectViewer
#
#  These are baked in (non-secret, match cloudbuild.yaml):
#    REGISTRY            us-central1-docker.pkg.dev
#    IMAGE_REPO          petclub-repo/petclub-backend
#    CLOUD_RUN_SERVICE   petclub-backend
#    CLOUD_RUN_REGION    us-west1
#    SERVICE_ACCOUNT     1084002294076-compute@developer.gserviceaccount.com
# ══════════════════════════════════════════════════════════════════

name: Deploy Backend → Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:            # allow manual trigger from GitHub UI

env:
  REGISTRY:           us-central1-docker.pkg.dev
  IMAGE_REPO:         petclub-repo/petclub-backend
  CLOUD_RUN_SERVICE:  petclub-backend
  CLOUD_RUN_REGION:   us-west1
  SERVICE_ACCOUNT:    1084002294076-compute@developer.gserviceaccount.com

# Required for Workload Identity Federation token exchange
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip the semantic-release version-bump commit — code is already deployed
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud (keyless WIF) ────────
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ env.SERVICE_ACCOUNT }}

      # ── 3. Set up gcloud CLI ────────────────────────────────
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Configure Docker to use Artifact Registry ────────
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Syntax check — fail fast before a 3-min Docker build ──
      - name: Syntax check
        run: find . -name "*.js" -not -path "./node_modules/*" | xargs node --check

      # ── 6. Build Docker image ────────────────────────────────
      - name: Build image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_REPO }}
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      # ── 7. Push image to Artifact Registry ──────────────────
      - name: Push image
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      # ── 8. Deploy to Cloud Run ───────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:    ${{ env.CLOUD_RUN_SERVICE }}
          region:     ${{ env.CLOUD_RUN_REGION }}
          image:      ${{ env.IMAGE }}:${{ github.sha }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 9. Health check ──────────────────────────────────────
      # Pass X-Health-Secret so the response includes service details.
      # Add HEALTH_SECRET to GitHub Secrets to enable the full response.
      - name: Verify deployment
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Deployed to: ${URL}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "X-Health-Secret: ${{ secrets.HEALTH_SECRET }}" \
              "${URL}/api/health")
            echo "Health check attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "✅ Health check passed"; exit 0; }
            sleep 10
          done
          echo "⚠️ Health check did not return 200 — check Cloud Run logs"
          exit 1
