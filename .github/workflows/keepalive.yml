# ══════════════════════════════════════════════════════════════════
#  PETclub Keep-Alive — runs every day at 08:00 UTC
#
#  Why this exists:
#    Supabase free-tier pauses after 7 days of zero DB activity.
#    Cloud Run cold-start latency also increases with inactivity.
#    GitHub Actions disables scheduled workflows after 60 days of
#    zero repository activity — the timestamp commit below prevents
#    that from ever happening.
#
#    This workflow:
#      1. Pings /api/health  → wakes Cloud Run + keeps Supabase active
#      2. Pings Vercel frontend → keeps CDN edge cache warm
#      3. Commits a daily timestamp → prevents GitHub's 60-day
#         scheduled-workflow disable rule from killing this cron
#
#  Permissions required (set below):
#    contents: write   — needed for the git commit step
# ══════════════════════════════════════════════════════════════════

name: Keep-Alive Ping

on:
  schedule:
    - cron: '0 8 * * *'       # 08:00 UTC daily  (1:30 PM IST / 4:00 AM EST)
  workflow_dispatch:            # allow manual trigger any time

permissions:
  contents: write               # needed to push the daily timestamp commit

jobs:
  ping:
    name: Ping API & Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout (needed for git commit below) ────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Ping backend health (wakes Cloud Run + Supabase) ──────
      - name: Ping backend health
        run: |
          echo "🐾 Pinging PETclub API health endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.mypetclub.app/api/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed with status $HTTP_CODE"
            exit 1
          fi
          echo "✅ API is alive — Supabase kept active"

      # ── 3. Ping frontend (keeps Vercel CDN warm) ─────────────────
      - name: Ping frontend
        run: |
          echo "🌐 Pinging frontend..."
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://app.mypetclub.app/)
          echo "Frontend HTTP status: $CODE"
          [ "$CODE" = "200" ] && echo "✅ Frontend alive" || echo "⚠️  Frontend returned $CODE"

      # ── 4. Refresh loyalty leaderboard ──────────────────────────
      # Belt-and-suspenders: cron.yml fires at 02:00 UTC via CRON_SECRET.
      # This is a fallback in case pg_cron is not enabled on Supabase.
      - name: Refresh loyalty leaderboard
        run: |
          if [ -n "${{ secrets.CRON_SECRET }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              https://api.mypetclub.app/api/cron/refresh-leaderboard)
            echo "Leaderboard refresh: HTTP $STATUS"
          else
            echo "⚠️  CRON_SECRET not set — skipping leaderboard refresh"
          fi

      # ── 5. Commit daily timestamp ─────────────────────────────────
      # Prevents GitHub from disabling this scheduled workflow after
      # 60 days of zero repository activity.
      - name: Commit daily keep-alive timestamp
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p .github/keepalive
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/keepalive/timestamp.txt

          git add .github/keepalive/timestamp.txt
          git diff --staged --quiet || git commit -m "chore: keep-alive timestamp $(date -u '+%Y-%m-%d') [skip ci]"
          git push
