# Run this ONCE manually (Actions → Create Labels → Run workflow)
# to create the GitHub labels the health monitor needs.
name: 🏷️ Create Labels (run once)

on:
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'incident',  color: 'D93F0B', description: 'Production incident — auto-created by health monitor' },
              { name: 'automated', color: '0075CA', description: 'Created automatically by a GitHub Action' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Label already exists: ${label.name}`);
                } else throw e;
              }
            }
