# PETclub - Automated Health Monitor
#
# Runs every 2 hours. If any service is down it:
#   1. Waits 3 min and re-checks (eliminates transient blips)
#   2. Tries to auto-recover (rolls Cloud Run back to last healthy revision)
#   3. Sends an SMS via Twilio directly (works even if backend is down)
#   4. Opens a GitHub Issue tagged [incident] with full diagnostic
#   5. Adds a comment to any existing incident issue (avoids spam)
#
# When all services recover, re-checks automatically close the incident issue.
#
# Required GitHub Secrets (Repo -> Settings -> Secrets -> Actions):
#   HEALTH_SECRET       - same value as HEALTH_SECRET in Cloud Run env vars
#   TWILIO_ACCOUNT_SID  - same as Cloud Run TWILIO_ACCOUNT_SID
#   TWILIO_AUTH_TOKEN   - same as Cloud Run TWILIO_AUTH_TOKEN
#   TWILIO_FROM_PHONE   - your Twilio number  (e.g. +12025551234)
#   ADMIN_PHONE         - your mobile number  (e.g. +16097215754)
#
# Optional (enables Cloud Run auto-rollback):
#   GCP_SA_KEY          - JSON service-account key with roles/run.admin
#   GCP_PROJECT_ID      - your GCP project ID  (e.g. petclub-prod)
#   GCP_REGION          - Cloud Run region     (default: us-central1)
#   GCP_SERVICE_NAME    - Cloud Run service    (default: petclub-backend)

name: Health Monitor

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours, on the hour (UTC)
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Force SMS + issue even if healthy (for testing)?'
        required: false
        default: 'false'

concurrency:
  group: health-monitor
  cancel-in-progress: false

jobs:

  # ── Step 1: Probe both services ────────────────────────────────────────
  probe:
    name: Probe Services
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      backend_ok:   ${{ steps.backend.outputs.ok }}
      frontend_ok:  ${{ steps.frontend.outputs.ok }}
      backend_body: ${{ steps.backend.outputs.body }}
      backend_http: ${{ steps.backend.outputs.http }}

    steps:
      - name: Check Backend API
        id: backend
        run: |
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 12 \
            -H "X-Health-Secret: ${{ secrets.HEALTH_SECRET }}" \
            https://api.mypetclub.app/api/health \
            || echo "000")

          BODY=$(cat /tmp/health.json 2>/dev/null \
            | python3 -m json.tool --no-ensure-ascii 2>/dev/null \
            || cat /tmp/health.json 2>/dev/null \
            || echo "no response")

          echo "http=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Backend healthy (HTTP 200)"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Backend returned HTTP $HTTP"
          fi
          {
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check Frontend (Vercel)
        id: frontend
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 12 --location \
            https://app.mypetclub.app \
            || echo "000")

          if [ "$HTTP" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Frontend healthy (HTTP 200)"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Frontend returned HTTP $HTTP"
          fi

  # ── Step 2: Re-check after 3 min (filter transient blips) ─────────────
  recheck:
    name: Re-check After 3 Minutes
    needs: probe
    if: needs.probe.outputs.backend_ok == 'false' || needs.probe.outputs.frontend_ok == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      backend_ok:  ${{ steps.backend.outputs.ok }}
      frontend_ok: ${{ steps.frontend.outputs.ok }}

    steps:
      - name: Wait 3 minutes
        run: |
          echo "Waiting 180 s before re-check to filter transient failures..."
          sleep 180

      - name: Re-check Backend
        id: backend
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 12 \
            -H "X-Health-Secret: ${{ secrets.HEALTH_SECRET }}" \
            https://api.mypetclub.app/api/health \
            || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Backend re-check: HTTP $HTTP"

      - name: Re-check Frontend
        id: frontend
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 12 --location \
            https://app.mypetclub.app \
            || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Frontend re-check: HTTP $HTTP"

  # ── Step 3: Auto-recover Cloud Run (backend only) ─────────────────────
  # NOTE: secrets context is invalid in job-level if: — GCP check uses env var
  auto_recover:
    name: Auto-Recover Cloud Run
    needs: [probe, recheck]
    if: always() && needs.recheck.result == 'success' && needs.recheck.outputs.backend_ok == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    outputs:
      recovered: ${{ steps.recover.outputs.recovered }}

    steps:
      - name: Skip - GCP not configured
        if: env.GCP_SA_KEY == ''
        run: |
          echo "GCP_SA_KEY not set — skipping Cloud Run rollback."
          echo "recovered=skipped" >> "$GITHUB_OUTPUT"

      - name: Authenticate with GCP
        if: env.GCP_SA_KEY != ''
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          gcloud config set project "${{ secrets.GCP_PROJECT_ID }}" --quiet

      - name: Roll back to previous healthy revision
        id: recover
        if: env.GCP_SA_KEY != ''
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: '1'
        run: |
          SERVICE="${{ secrets.GCP_SERVICE_NAME || 'petclub-backend' }}"
          REGION="${{ secrets.GCP_REGION || 'us-central1' }}"

          REVISIONS=$(gcloud run revisions list \
            --service="$SERVICE" --region="$REGION" \
            --format="value(name)" --limit=5 \
            --sort-by="~metadata.creationTimestamp")

          PREVIOUS=$(echo "$REVISIONS" | sed -n '2p')

          if [ -n "$PREVIOUS" ]; then
            echo "Rolling back to $PREVIOUS..."
            gcloud run services update-traffic "$SERVICE" \
              --region="$REGION" --to-revisions="${PREVIOUS}=100" --quiet
            sleep 45
          else
            echo "No previous revision — restarting current..."
            gcloud run services update-traffic "$SERVICE" \
              --region="$REGION" --to-latest --quiet
            sleep 45
          fi

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 12 \
            https://api.mypetclub.app/api/health || echo "000")

          if [ "$HTTP" = "200" ]; then
            echo "recovered=true" >> "$GITHUB_OUTPUT"
            echo "Auto-recovery successful!"
          else
            echo "recovered=false" >> "$GITHUB_OUTPUT"
            echo "Auto-recovery failed (HTTP $HTTP)"
          fi

  # ── Step 4: Alert + create/update GitHub Issue ─────────────────────────
  alert:
    name: Alert and Create Incident Issue
    needs: [probe, recheck, auto_recover]
    if: always() && needs.recheck.result == 'success' && (needs.recheck.outputs.backend_ok == 'false' || needs.recheck.outputs.frontend_ok == 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TWILIO_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
      ADMIN_PHONE:  ${{ secrets.ADMIN_PHONE }}

    steps:
      - name: Send SMS via Twilio
        if: env.TWILIO_SID != '' && env.ADMIN_PHONE != ''
        run: |
          RECOVERED="${{ needs.auto_recover.outputs.recovered }}"
          if [ "$RECOVERED" = "true" ]; then
            MSG="PETclub ALERT: Backend was DOWN but auto-recovered. See GitHub Issues: https://github.com/${{ github.repository }}/issues"
          else
            BSTATUS="${{ needs.recheck.outputs.backend_ok == 'true' && 'OK' || 'DOWN' }}"
            FSTATUS="${{ needs.recheck.outputs.frontend_ok == 'true' && 'OK' || 'DOWN' }}"
            MSG="PETclub ALERT: Backend=$BSTATUS Frontend=$FSTATUS — action needed: https://github.com/${{ github.repository }}/issues"
          fi
          curl -s -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "Body=$MSG" \
            --data-urlencode "From=${{ secrets.TWILIO_FROM_PHONE }}" \
            --data-urlencode "To=${{ secrets.ADMIN_PHONE }}" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
            > /dev/null && echo "SMS sent to admin" || echo "SMS failed — check Twilio secrets"

      - name: Create or update GitHub Issue
        uses: actions/github-script@v8
        with:
          script: |
            const backendOk  = '${{ needs.recheck.outputs.backend_ok }}'  === 'true';
            const frontendOk = '${{ needs.recheck.outputs.frontend_ok }}' === 'true';
            const recovered  = '${{ needs.auto_recover.outputs.recovered }}';
            const backendBody = `${{ needs.probe.outputs.backend_body }}`;
            const now = new Date().toISOString();

            const recoveryNote = recovered === 'true'
              ? 'Auto-recovered — Cloud Run rolled back to previous revision.'
              : recovered === 'false'
              ? 'Auto-recovery attempted but FAILED — manual intervention required.'
              : 'Auto-recovery skipped (GCP not configured or frontend-only issue).';

            const body = [
              '## PETclub Health Alert',
              '',
              `**Detected:** ${now}`,
              `**Run:** [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '',
              '### Service Status',
              '| Service | Status |',
              '|---------|--------|',
              `| Backend API (api.mypetclub.app) | ${backendOk ? 'OK' : 'DOWN'} |`,
              `| Frontend (app.mypetclub.app)    | ${frontendOk ? 'OK' : 'DOWN'} |`,
              '',
              '### Auto-Recovery',
              recoveryNote,
              '',
              '### Backend Health Response',
              '```json',
              backendBody || 'No response from backend',
              '```',
              '',
              '### Next Steps',
              '1. Check [Cloud Run logs](https://console.cloud.google.com/run)',
              '2. Check [Supabase dashboard](https://supabase.com/dashboard)',
              '3. Verify environment variables in Cloud Run',
              '',
              '---',
              '*Auto-generated by Health Monitor*',
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'incident', state: 'open',
            });

            if (openIssues.length === 0) {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Health Alert - ${now.slice(0, 16).replace('T', ' ')} UTC`,
                body, labels: ['incident', 'automated'],
              });
              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            } else {
              const issueNum = openIssues[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum,
                body: `## Follow-up Alert - ${now}\n\n${body}`,
              });
              console.log(`Commented on existing issue #${issueNum}`);
            }

  # ── Step 5: Auto-close incident when all services recover ─────────────
  resolve:
    name: Close Incident if Recovered
    needs: probe
    if: needs.probe.outputs.backend_ok == 'true' && needs.probe.outputs.frontend_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close open incident issues
        uses: actions/github-script@v8
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'incident', state: 'open',
            });

            if (openIssues.length === 0) {
              console.log('No open incidents — all clear.');
              return;
            }

            const now = new Date().toISOString();
            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## All Systems Recovered',
                  '',
                  `**Resolved:** ${now}`,
                  '',
                  '| Service | Status |',
                  '|---------|--------|',
                  '| Backend API (api.mypetclub.app) | OK |',
                  '| Frontend (app.mypetclub.app)    | OK |',
                  '',
                  '*Auto-resolved by Health Monitor*',
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
              });
              console.log(`Closed incident issue #${issue.number}`);
            }
